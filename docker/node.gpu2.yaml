# Single-GPU soak node config, mounted into the supervised all-in-one container
# (docker-compose.gpu2.yml). The supervisor runs one worker on the GPU selected by
# CUDA_VISIBLE_DEVICES plus the embedded gateway; the explicit single-worker list below is
# honored as-is (the one visible device is assigned to it).
#
# No `models:` map is needed: every bundle in the model repository is loaded and served by the
# worker. The on-demand weight cache (weight_cache_bytes below) keeps it memory-safe by loading
# weights lazily and evicting LRU within the GPU byte budget, so all the models need not be
# resident at once. Add a `models:` map only to pin specific models to device memory (see
# node.yaml for the format).
model_repo: /var/lib/reactantserver/models
base_port: 8080
# Per-worker Prometheus metrics port (metrics_base_port + worker index). Each worker serves
# /metrics, /healthz, /readyz here; scrape them as separate targets (see docker/README.md).
metrics_base_port: 9100

global:
  cache_dir: /var/cache/reactantserver
  # Model lifecycle control mode: dynamic (default) watches the repo and hot-swaps bundles as they
  # are added/changed/removed; static keeps the startup set fixed; explicit cedes authority to the
  # control plane. In dynamic mode model_poll_seconds sets the poll interval (default 15s).
  # model_control_mode: dynamic
  runtime:
    backend: cuda
    mem_fraction: 0.9
    # Preallocate one BFC arena up front so every sub-allocation (activations, autotune/recompile
    # scratch, weight-cache reloads) is served from it and never fragments the driver memory map.
    # mem_fraction leaves the complement outside the pool for the CUDA context and command-buffer
    # (CUDA graph) instantiation.
    preallocate: true
    allow_cpu_fallback: false
    # On-demand weight cache: weights load lazily and evict LRU within this GPU byte budget, so all
    # models need not be resident at once. 0 would keep every weight resident.
    weight_cache_bytes: 25769803776
  scheduler:
    ema_halflife_seconds: 30.0
    max_queue_depth: 1024
  endpoints:
    host: 0.0.0.0

workers:
  - { name: worker0 }
