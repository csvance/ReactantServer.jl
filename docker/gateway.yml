# Gateway config for the docker compose deployment. The gateway is decoupled from the node file:
# it is given a flat list of worker `endpoints` (host:port) and autodiscovers which models each
# serves via RepositoryIndex, refreshing its routing table periodically. Endpoints use the compose
# service names as hostnames; ports follow the node's base_port (8080) plus the worker index, so
# worker0 listens on 8080 and worker1 on 8081. To front multiple nodes, list every node's worker
# endpoints here (e.g. node1-worker0:8080, node2-worker0:8080, ...).

listen:
  grpc: "0.0.0.0:8001"
  metrics: "0.0.0.0:8002"

grpc:
  max_recv_msg_bytes: 268435456
  max_send_msg_bytes: 268435456

logging:
  level: "info"
  format: "json"

# Request scheduling across workers. round_robin (default) spreads each model uniformly;
# lpt_packing places each model on a fixed number of distinct GPUs and routes its requests to
# fill one replica's batch before the next, maximizing batch coalescing. lpt_packing requires
# worker scheduler.discipline: fifo (node file) and all models loaded on all workers. The
# embedded gateway reads the same knobs from REACTANT_GATEWAY_SCHEDULING_* environment variables.
# NOTE: replicas are the operator's responsibility. A replica charges the model's full weight
# footprint to every GPU it lands on; if that does not fit a GPU's weight budget the worker
# thrashes (loads/evicts weights on nearly every request). Size replica counts to your GPU memory.
# scheduling:
#   mode: lpt_packing               # round_robin | least_outstanding | lpt_packing
#   rebalance_compute_seconds: 30.0 # fleet GPU-seconds consumed that triggers a repack
#   min_rebalance_seconds: 0.0      # wall-clock floor between repacks (0 = none)
#   default_replicas: 1             # GPUs per model unless overridden below (a number, or "all")
#   routing_fill_factor: 1.0        # per-replica fill target as a multiple of max batch size (lpt_packing only)
#   routing_policy: fill_rr         # fill_rr (default) | fill_least  (lpt_packing only)
#   models:
#     resnet50:
#       replicas: 2                 # this model on 2 distinct GPUs (a number, or "all")

endpoints:
  - "worker0:8080"
  - "worker1:8081"

# Optional: the workers' Prometheus metrics addresses (metrics_base_port + index in the node
# file). When listed, the gateway's /metrics aggregates every worker's export behind its own,
# so one scrape target covers the whole deployment; workers tag their series with worker/gpu
# labels themselves. The supervisor's embedded gateway wires this automatically.
# metrics_endpoints:
#   - "worker0:9100"
#   - "worker1:9101"
