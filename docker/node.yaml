# Node config template: one machine, one shared IPC space. The image bakes a zero-config
# default (docker/node.default.yaml: `gpus: auto`, no workers list, one worker synthesized per
# detected GPU); mount a file like this one over /etc/reactantserver/node.yaml only to override
# it, e.g. to pin models to device memory, change ports, or list workers explicitly. Each worker
# loads (and can serve) every bundle in the mounted model repository. The embedded gateway is
# configured by the supervisor automatically; a standalone gateway (multi-node) reads its own
# docker/gateway.yml and discovers what each worker serves, so it never reads this file.
#
# The `workers:` list below is optional under the supervisor: omit it (optionally setting
# `gpus:` to auto, a count, or an explicit device list) and one worker per detected GPU is
# synthesized. An explicit list wins when present; the supervisor then assigns device i to
# worker i (or honors a per-worker `gpu:` index among the visible devices).
#
# The optional `models:` map (below) is only for pinning specific models to device memory.

model_repo: /var/lib/reactantserver/models
base_port: 8080
# Per-worker Prometheus metrics port (metrics_base_port + worker index): worker0 -> 9100,
# worker1 -> 9101, ... Each worker serves /metrics, /healthz, /readyz. Scrape them as separate
# Prometheus targets, one per GPU (see docker/README.md).
metrics_base_port: 9100

global:
  cache_dir: /var/cache/reactantserver
  # Model lifecycle control mode: dynamic (default) watches the repo and hot-swaps bundles as they
  # are added/changed/removed; static keeps the startup set fixed; explicit cedes authority to the
  # control plane. In dynamic mode model_poll_seconds sets the poll interval (default 15s).
  # model_control_mode: dynamic
  runtime:
    backend: cuda
    mem_fraction: 0.9
    # Preallocate one BFC arena up front so every sub-allocation (activations, autotune/recompile
    # scratch, weight-cache reloads) is served from it and never fragments the driver memory map.
    # mem_fraction leaves the complement outside the pool for the CUDA context and command-buffer
    # (CUDA graph) instantiation.
    preallocate: true
    allow_cpu_fallback: false
  scheduler:
    ema_halflife_seconds: 30.0
    max_queue_depth: 1024
  endpoints:
    host: 0.0.0.0

# Workers are optional under the supervisor: omit this list and the supervisor synthesizes one
# worker per detected GPU (set `gpus: auto`, a count, or a device list above; the `REACTANT_GPUS`
# env overrides it). When you do list workers, the supervisor assigns each one a detected device
# and sets that worker's own CUDA_VISIBLE_DEVICES, so each worker sees a single GPU at ordinal 0 —
# you do not set CUDA_VISIBLE_DEVICES per worker yourself. Add `gpu: N` to an entry only to pin it
# to a specific device among those visible.
workers:
  - { name: worker0 }
  - { name: worker1 }

# Optional per-model override. Every worker already loads and can serve every bundle in the repo
# (the gateway replicates and load-balances across all workers that report a model ready). List a
# model here only to pin it permanently to device memory on the named worker(s) for the lowest
# latency; unlisted models stay system-pinned and load to the device on demand. Use the bundle
# directory names. Omit this block entirely to keep every model on-demand.
#
# models:
#   resnet50: [worker0, worker1]      # hot on both GPUs
#   vsq_coral: [worker0]              # hot on worker0 only
