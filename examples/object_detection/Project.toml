# Standalone environment for the end-to-end object detection demo (examples/object_detection/demo.jl).
# Mirrors the path-source closure pattern of docs/Project.toml (a standalone env declares the vendored
# packages + lib/ forks itself), and adds: ReactantServerExport + PythonCall for the export step, and
# CairoMakie/FileIO/ImageIO/ImageTransformations for loading and drawing.
#
# The export step (running tools/convert_to_stablehlo.jl) additionally needs a Python with
# torch/torchax/torchvision/triton wired into PythonCall (CondaPkg or JULIA_PYTHONCALL_EXE) — the same
# stack any model conversion needs. The serve/client/draw steps need no Python at all.

[deps]
CairoMakie = "13f3f980-e62b-5c42-98c6-ff1f3baf88f0"
Colors = "5ae59095-9a9b-59fe-a467-6f913c188581"
Downloads = "f43a241f-c20a-4ad4-852c-f6b1247861c6"
FileIO = "5789e2e9-d7fb-5bc7-8068-2c6fae9b9549"
HTTP = "cd3eb016-35fb-5094-929b-558a96fad6f3"
ImageIO = "82e4d734-157c-48bb-816b-45c225c6df19"
ImageTransformations = "02fcd773-0e25-5acc-982a-7f6622650795"
PythonCall = "6099a3de-0909-46bc-b1f4-468b9a2dfc0d"
Reactant = "3c362404-f566-11ee-1572-e11a4b42c853"
ReactantServer = "faa8a0e4-1926-4c6b-a0e2-e70699715ecf"
ReactantServerClient = "df172679-9d9b-4a02-a92c-27cb5f9e1c5c"
ReactantServerCore = "387a5f05-f7b4-4d57-bca9-cd3358e52bdc"
ReactantServerExport = "90fa0446-f028-4638-8833-e223884d9b4d"
Sockets = "6462fe0b-24de-5631-8697-dd941f90decc"
gRPCClient = "aaca4a50-36af-4a1d-b878-4c443f2061ad"
gRPCServer = "b7f0dee4-5e6a-42e7-93b0-9c098bad2317"

[sources]
