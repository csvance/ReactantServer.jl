# Export environment: traces the torchvision Faster R-CNN into StableHLO bundles. This is the only
# environment that loads PythonCall + the torch stack; keeping it separate from the server (Reactant)
# and client (CairoMakie) environments avoids dragging the torch/Conda world into either of those.

[deps]
PythonCall = "6099a3de-0909-46bc-b1f4-468b9a2dfc0d"
Reactant = "3c362404-f566-11ee-1572-e11a4b42c853"
ReactantServerExport = "90fa0446-f028-4638-8833-e223884d9b4d"
YAML = "ddb6d928-2868-570f-bddf-ab3f9cf99eb6"

[sources]
Reactant = {path = "../../../lib/Reactant.jl"}
ReactantServerExport = {path = "../../../packages/ReactantServerExport"}

[compat]
julia = "1.12"
