# Podman-tailored end-to-end stack: ONE supervised container driving two GPUs (attached via CDI),
# the production single-node multi-GPU shape. The supervisor detects both GPUs, runs worker0 and
# worker1 plus the embedded gateway, and the host-side client drives both the inline (TCP) and the
# POSIX shared-memory data paths through the gateway. Brought up by test/e2e/run_e2e.sh
# (`make e2e`) with podman-compose, which forwards CDI `devices:` to `podman run --device` (the
# docker-compose provider mangles them).
#
# Volume sources are absolute via ${REACTANT_REPO} (the repo root, exported by run_e2e.sh) so path
# resolution does not depend on the compose tool's working directory. This file is separate from
# the production docker-compose.yml (which targets Docker and the nvidia `deploy` stanza).

services:
  reactantserver:
    image: reactantserver:latest
    # Default entrypoint: the node supervisor. It sees the two CDI GPUs (nvidia-smi inside the
    # container renumbers them to 0,1), synthesizes worker0/worker1 from the node file, and runs
    # the embedded gateway (two workers => gateway on 8001/8002, workers on 8080/8081).
    devices:
      - "nvidia.com/gpu=${E2E_GPU0:-2}"
      - "nvidia.com/gpu=${E2E_GPU1:-1}"
    volumes:
      - ${REACTANT_REPO:?set REACTANT_REPO to the repo root (run via make e2e / run_e2e.sh)}/packages/ReactantServer/test/e2e/node.yaml:/etc/reactantserver/node.yaml:ro
      - ${REACTANT_REPO}/packages/ReactantServer/test/e2e/models/scale4:/var/lib/reactantserver/models/scale4:ro
      # Generated at e2e time by gen_bit_resnet50.jl (random-init Luximm model; not checked in).
      - ${REACTANT_REPO}/packages/ReactantServer/test/e2e/models/bit_resnet50:/var/lib/reactantserver/models/bit_resnet50:ro
      # Share the host's POSIX shared memory so the host-side client and the workers see the same
      # /dev/shm regions (the KServe system-shared-memory data plane). `ipc: host` below is the
      # intent and works under Docker, but podman-compose silently ignores it, so bind-mount
      # /dev/shm explicitly, which podman-compose honors and which fully shares POSIX shm.
      - /dev/shm:/dev/shm
    ipc: host
    # Host ports are remapped off 8001/8002/8080 to avoid colliding with a co-resident Triton
    # (whose gRPC default is 8001 and metrics 8002). Container-internal ports are the supervisor's
    # public 8001/8002 plus worker0's own 8080 (for the client's ModelMetadata introspection,
    # which the gateway does not proxy).
    ports:
      - "18501:8001"   # host:container; KServe V2 gRPC for the client (embedded gateway)
      - "19501:8002"   # host:container; metrics / health (used by the readiness poll)
      - "18080:8080"   # host:container; worker0 direct, for ModelMetadata introspection
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.node.sh"]
      interval: 15s
      timeout: 20s
      retries: 40
      start_period: 600s   # covers Reactant CUDA compilation of bit_resnet50 at startup
    stop_grace_period: 30s
