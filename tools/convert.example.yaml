# Example config for tools/convert_to_stablehlo.jl. Copy it somewhere
# outside version control (e.g. private/convert.yaml, private/ is gitignored),
# fill in the real model names, and pass it on the command line:
#
#   julia tools/convert_to_stablehlo.jl private/convert.yaml [--only a,b] [--force] [--dry-run]
#
# All relative paths resolve against this file's directory. Handler option
# values whose key ends in _dir or _path are resolved the same way.

# Triton model repositories to scan, in order. When the same model name exists
# in more than one source, the later bundle gets a "__dynamic" suffix.
source_dirs:
  - /docker/triton/models
  - /docker/triton/dynamic

# Where bundles are written: <output_root>/<name>/ with manifest.yaml,
# model.b{N}.mlir per batch size, and weights.safetensors.
output_root: /docker/reactantserver/models

# Markdown report for full runs (--only runs do not overwrite it).
report_path: /docker/reactantserver/conversion_report.md

# Models the converter must not build, keyed by Triton model name.
# remove_existing (default false) deletes any stale bundle dir on each run.
exclude:
  model_alpha:
    reason: "not run on Reactant/XLA (multi-rank inputs unsupported by the server batch-axis check)"
    remove_existing: true

# Special-case builders for models the generic converter cannot handle (e.g.
# data-dependent tails that need a wrapper plus a serve-time postprocess).
# Each handler file is included into its own module; its last expression must
# evaluate to a function handler(ctx) -> Vector{Int} (batch sizes written).
# See the handler contract in tools/convert_to_stablehlo.jl. Handler
# files must exist at config-load time, so this block ships commented out:
#
# handlers:
#   - file: handlers/example_logits.jl
#     models: [model_beta, model_gamma]
#     options:
#       postprocess_dir: postprocess
#
#   # A standard torchvision Faster R-CNN object detector, split into a
#   # backbone+RPN stage, a box-head stage, and a meta bundle that chains them
#   # through the data-dependent DetectionGlue (NMS, roi_align, box decode). The
#   # shipped tools/handlers/torchvision_frcnn_detector.jl drives this via
#   # torch.export (no torch.jit); see docs/src/manual/object_detection.md.
#   - file: handlers/torchvision_frcnn_detector.jl
#     models: [my_detector]
#     options:
#       weights: DEFAULT    # DEFAULT = pretrained COCO; "none" = random; or a state_dict .pth path
#       num_classes: 91     # classes INCLUDING background; set when loading a custom head
#       image_size: 640     # canonical square input edge, divisible by 64
#       input_dtype: u8     # client image dtype (u8 | f32)
#       output_cols: 6      # 5 = [box4, score]; 6 = [box4, score, class]
#       # input_shapes: [[640, 640], [640, 896]]  # optional aspect-ratio variants sharing one weight set
