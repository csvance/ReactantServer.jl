# Four-GPU lpt_packing soak stack: the supervised node across four GPUs (no replication) plus a
# dummy-data load generator, under `docker compose`. Where docker-compose.gpu2.yml exercises a
# single worker serving directly, this runs four workers behind the embedded gateway in lpt_packing
# mode, so it exercises the gateway's packing placement and coalescing-aware routing on the full
# serving path. Use it to watch for memory leaks, races, and instability in the multi-GPU path.
#
# Prerequisites:
#   - images built: `make image loadgen`
#   - the NVIDIA container runtime is available to Docker (sudo nvidia-ctk runtime configure
#     --runtime=docker && sudo systemctl restart docker)
#   - git submodules checked out (lib/Reactant.jl, gRPC*, HTTP, Prometheus)
#
# Usage:
#   REACTANTSERVER_MODELS=/path/to/bundles docker compose -f docker-compose.gpu0123.yml up
#
# All four workers compile and warm up every model's executables before they serve, so first startup
# is slow (potentially hours for all 85 bundles). The healthcheck start_period is set high to cover
# this; for a quick check, restrict the set with LOADGEN_MODELS and trim the bundle mount. The
# embedded gateway's lpt_packing startup checks (all workers reachable, fifo discipline, identical
# model sets) cannot pass until every worker finishes compiling, so the gateway waits for them
# (logging which workers are still pending) instead of failing; the supervisor sets this wait
# automatically. The gateway begins serving once all four workers are up.

services:
  reactantserver:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: reactantserver:latest
    # Default entrypoint: the node supervisor. With four visible GPUs it runs four workers plus the
    # embedded gateway, which binds the public ports 8001/8002 and routes to the workers.
    volumes:
      - ./docker/node.gpu0123.yaml:/etc/reactantserver/node.yaml:ro
      - ${REACTANTSERVER_MODELS:-/docker/reactantserver/models}:/var/lib/reactantserver/models:ro
      # Persistent XLA compile cache (autotune results + GPU kernel binaries), shared by all four
      # workers in this container. Pinned by packages/ReactantServer/LocalPreferences.toml so warm
      # restarts skip recompilation work.
      - reactant-compile-cache:/var/cache/reactant-compile
    # Share the host IPC namespace and its /dev/shm so the load generator's POSIX shared-memory
    # regions are visible to the workers. Under Docker, ipc: host also mounts the host /dev/shm
    # (replacing the small default), so no explicit /dev/shm bind is needed.
    ipc: host
    ports:
      - "8001:8001"   # KServe V2 gRPC endpoint, served by the embedded gateway (Triton-compatible)
      - "8002:8002"   # the gateway's /metrics, /healthz, /readyz (aggregates all workers' series)
    environment:
      # Physical GPUs 0, 1, 2 and 3; the supervisor assigns one to each worker child, which CUDA
      # renumbers to ordinal 0 inside its subprocess.
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
      # Inject nvidia-smi + NVML (the "utility" driver capability) alongside the compute libraries,
      # so the entrypoint GPU-reclaim gate and the worker out-of-pool memory metric work. Pinned here
      # rather than relying on the host container-runtime default capability set.
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      # Put the embedded gateway in lpt_packing mode without replication: each model is placed on a
      # single GPU and its traffic concentrated there for batch coalescing. The embedded gateway
      # inherits these REACTANT_GATEWAY_SCHEDULING_* variables from this environment.
      REACTANT_GATEWAY_SCHEDULING_MODE: "lpt_packing"
      REACTANT_GATEWAY_SCHEDULING_DEFAULT_REPLICAS: "1"
      # Doubled from 30s: each repack relocates models (transient recompile/unavailability) and spiked
      # the per-worker GPU dispatch queue, inflating meta sub-call wait tails (p99 4-7s). A slower
      # rebalance lets steady-state settle; raise further (or bump hysteresis) if tails persist.
      REACTANT_GATEWAY_SCHEDULING_REBALANCE_COMPUTE_SECONDS: "60.0"
    # The supervisor forwards SIGTERM to its children and waits for them before exiting.
    stop_grace_period: 30s
    healthcheck:
      # Role-aware probe; for the all-in-one role it curls /readyz on 8002 (here the embedded
      # gateway's, ready once at least one worker has compiled every model and serves).
      test: ["CMD", "/usr/local/bin/healthcheck.node.sh"]
      interval: 30s
      timeout: 20s
      retries: 5
      # Generous: every model compiles and warms up on all four workers before the gRPC plane
      # accepts traffic.
      start_period: 14400s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all

  loadgen:
    build:
      context: .
      dockerfile: docker/Dockerfile.loadgen
    image: reactantserver-loadgen:latest
    depends_on:
      reactantserver:
        condition: service_healthy
    volumes:
      # Read the manifests to synthesize correctly shaped dummy inputs (manifest_io_spec).
      - ${REACTANTSERVER_MODELS:-/docker/reactantserver/models}:/var/lib/reactantserver/models:ro
    # ipc: host shares the host IPC namespace and /dev/shm, so the shm transport's regions reach
    # the workers without an explicit /dev/shm bind.
    ipc: host
    environment:
      LOADGEN_GATEWAY: "grpc://reactantserver:8001"
      LOADGEN_METRICS: "http://reactantserver:8002/metrics"
      LOADGEN_MODEL_REPO: "/var/lib/reactantserver/models"
      LOADGEN_CONCURRENCY: "32"
      LOADGEN_DURATION_SECONDS: "3600"
      LOADGEN_TRANSPORT: "tcp"        # tcp | shm | mixed
      LOADGEN_SHM_OUTPUTS: "true"     # shm path also reads outputs back through shared memory
      LOADGEN_REPORT_SECONDS: "30"
      # 8 compute + 1 interactive: the firing tasks saturate the compute pool at concurrency 32, so
      # the stats reporter runs on the reserved interactive thread (Threads.@spawn :interactive) and
      # keeps printing instead of starving once the soak is at full load.
      JULIA_NUM_THREADS: "8,1"

volumes:
  # Survives `docker compose down/up` so the workers' first-run compilation work is reused.
  reactant-compile-cache:
