# Single-GPU end-to-end soak stack: the supervised node on one GPU plus a dummy-data load
# generator, under `docker compose`. Use this to exercise the full serving path on one GPU and
# watch for memory leaks, races, and instability. It runs the same container as a production
# single-GPU deployment (the supervisor with one worker and no gateway, the worker serving
# 8001/8002 directly), so the soak mirrors what users actually run.
#
# Prerequisites:
#   - images built: `make image loadgen`
#   - the NVIDIA container runtime is available to Docker (sudo nvidia-ctk runtime configure
#     --runtime=docker && sudo systemctl restart docker)
#   - git submodules checked out (lib/Reactant.jl, gRPC*, HTTP, Prometheus)
#
# Usage:
#   REACTANTSERVER_MODELS=/path/to/bundles docker compose -f docker-compose.gpu2.yml up
#
# The worker compiles and warms up every model's executables before it serves, so first startup is
# slow (potentially hours for all 85 bundles). The healthcheck start_period is set high to cover
# this; for a quick check, restrict the set with LOADGEN_MODELS and trim the bundle mount.

services:
  reactantserver:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: reactantserver:latest
    # Default entrypoint: the node supervisor. With a single GPU it runs one worker and no
    # gateway (a lone worker serves the full KServe V2 API itself), binding the public ports
    # 8001/8002 directly, exactly as a production single-GPU deployment does.
    volumes:
      - ./docker/node.gpu2.yaml:/etc/reactantserver/node.yaml:ro
      - ${REACTANTSERVER_MODELS:-/docker/xlaserver/models}:/var/lib/reactantserver/models:ro
      # Persistent XLA compile cache (autotune results + GPU kernel binaries). Pinned here by
      # packages/ReactantServer/LocalPreferences.toml so warm restarts skip recompilation work.
      - reactant-compile-cache:/var/cache/reactant-compile
    # Share the host IPC namespace and its /dev/shm so the load generator's POSIX shared-memory
    # regions are visible to the worker. Under Docker, ipc: host also mounts the host /dev/shm
    # (replacing the small default), so no explicit /dev/shm bind is needed.
    ipc: host
    ports:
      - "8001:8001"   # KServe V2 gRPC endpoint, served by the worker directly (Triton-compatible)
      - "8002:8002"   # the worker's /metrics, /healthz, /readyz (series already tagged worker/gpu)
    environment:
      # Physical GPU 2; the supervisor passes it to the worker child, which CUDA renumbers to
      # ordinal 0 inside the container.
      CUDA_VISIBLE_DEVICES: "2"
    # The supervisor forwards SIGTERM to its children and waits for them before exiting.
    stop_grace_period: 30s
    healthcheck:
      # Role-aware probe; for the all-in-one role it curls /readyz on 8002 (here the worker's own,
      # ready once every model is compiled and the gRPC plane is up).
      test: ["CMD", "/usr/local/bin/healthcheck.node.sh"]
      interval: 30s
      timeout: 20s
      retries: 5
      # Generous: every model compiles and warms up before the gRPC plane accepts traffic.
      start_period: 14400s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: all

  loadgen:
    build:
      context: .
      dockerfile: docker/Dockerfile.loadgen
    image: reactantserver-loadgen:latest
    depends_on:
      reactantserver:
        condition: service_healthy
    volumes:
      # Read the manifests to synthesize correctly shaped dummy inputs (manifest_io_spec).
      - ${REACTANTSERVER_MODELS:-/docker/xlaserver/models}:/var/lib/reactantserver/models:ro
    # ipc: host shares the host IPC namespace and /dev/shm, so the shm transport's regions reach
    # the worker without an explicit /dev/shm bind.
    ipc: host
    environment:
      LOADGEN_GATEWAY: "grpc://reactantserver:8001"
      LOADGEN_METRICS: "http://reactantserver:8002/metrics"
      LOADGEN_MODEL_REPO: "/var/lib/reactantserver/models"
      LOADGEN_CONCURRENCY: "32"
      LOADGEN_DURATION_SECONDS: "3600"
      LOADGEN_TRANSPORT: "tcp"        # tcp | shm | mixed
      LOADGEN_SHM_OUTPUTS: "true"     # shm path also reads outputs back through shared memory
      LOADGEN_REPORT_SECONDS: "30"
      JULIA_NUM_THREADS: "8"

volumes:
  # Survives `docker compose down/up` so the worker's first-run compilation work is reused.
  reactant-compile-cache:
